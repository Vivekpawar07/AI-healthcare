{% extends 'base.html' %}
{% block title %}Add Patient — HealthTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Add New Patient</h4>
      </div>
      <div class="card-body p-4">
        <form method="post" novalidate>

          <h6 class="text-muted text-uppercase small fw-bold mb-3">Personal Information</h6>

          <div class="mb-3">
            <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              id="full_name"
              name="full_name"
              value="{{ form.get('full_name', '') }}"
              placeholder="e.g. Jane Smith"
              required
            >
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="date_of_birth" class="form-label">Date of Birth <span class="text-danger">*</span></label>
              <input
                type="date"
                class="form-control"
                id="date_of_birth"
                name="date_of_birth"
                value="{{ form.get('date_of_birth', '') }}"
                max="{{ today }}"
                required
              >
            </div>
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                value="{{ form.get('email', '') }}"
                placeholder="jane@example.com"
                required
              >
            </div>
          </div>

          <hr>
          <h6 class="text-muted text-uppercase small fw-bold mb-3">Blood Test Results</h6>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="glucose" class="form-label">
                Glucose <span class="text-danger">*</span>
                <small class="text-muted">(mg/dL)</small>
              </label>
              <input
                type="number"
                step="0.1"
                min="0"
                class="form-control"
                id="glucose"
                name="glucose"
                value="{{ form.get('glucose', '') }}"
                placeholder="e.g. 90"
                required
              >
              <div class="form-text">Normal fasting: 70–100</div>
            </div>
            <div class="col-md-4 mb-3">
              <label for="haemoglobin" class="form-label">
                Haemoglobin <span class="text-danger">*</span>
                <small class="text-muted">(g/dL)</small>
              </label>
              <input
                type="number"
                step="0.1"
                min="0"
                class="form-control"
                id="haemoglobin"
                name="haemoglobin"
                value="{{ form.get('haemoglobin', '') }}"
                placeholder="e.g. 14.5"
                required
              >
              <div class="form-text">Normal: 12–17.5</div>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cholesterol" class="form-label">
                Cholesterol <span class="text-danger">*</span>
                <small class="text-muted">(mg/dL)</small>
              </label>
              <input
                type="number"
                step="0.1"
                min="0"
                class="form-control"
                id="cholesterol"
                name="cholesterol"
                value="{{ form.get('cholesterol', '') }}"
                placeholder="e.g. 180"
                required
              >
              <div class="form-text">Desirable: &lt;200</div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-lg me-1"></i>Save Patient
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Set max date to today
  document.getElementById('date_of_birth').max = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
